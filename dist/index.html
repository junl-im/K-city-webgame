<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#111827" />
    <meta name="description" content="SOL Online Alpha - mobile 2.5D web MMORPG prototype" />
    <title>SOL Online Alpha</title>
    <script type="module" crossorigin src="./assets/index-BCnlyr8q.js"></script>
    <link rel="stylesheet" crossorigin href="./assets/index-CO0QIc00.css">
  </head>
  <body>
    <div id="app">
      <div id="game-root" class="game-root"></div>

      <header class="hud-top">
        <div class="portrait" id="classPortrait">S</div>
        <div class="hero-status">
          <div class="hud-row">
            <strong id="playerName">SOL 마스터</strong>
            <span id="levelText">Lv.1</span>
          </div>
          <div class="bar hp"><i id="hpBar"></i><em id="hpText">100/100</em></div>
          <div class="bar exp"><i id="expBar"></i><em id="expText">0%</em></div>
        </div>
        <button class="icon-btn" id="openMenu" title="메뉴" aria-label="메뉴">☰</button>
      </header>

      <aside class="resource-strip" aria-label="재화">
        <span id="goldText">0G</span>
        <span id="gemText">0소울</span>
        <span id="dpsText">전투력 0</span>
      </aside>

      <section class="target-card" id="targetCard">
        <div>
          <strong id="targetName">필드 탐색</strong>
          <span id="targetMeta">자동사냥 대기</span>
        </div>
        <div class="target-hp"><i id="targetHp"></i></div>
      </section>

      <div class="combat-log" id="combatLog"></div>

      <div class="joystick" id="joystick" aria-label="이동 조이스틱">
        <i id="joystickKnob"></i>
      </div>

      <nav class="action-dock" aria-label="전투 행동">
        <button id="autoHuntBtn" class="dock-btn active"><span>⟳</span><b>자동</b></button>
        <button id="attackBtn" class="dock-btn primary"><span>⚔</span><b>공격</b></button>
        <button id="cardsBtn" class="dock-btn"><span>◆</span><b>카드</b></button>
        <button id="inventoryBtn" class="dock-btn"><span>▤</span><b>가방</b></button>
      </nav>

      <section class="sheet" id="sheet" aria-hidden="true">
        <div class="sheet-head">
          <div>
            <span id="sheetEyebrow">SOUL CODEX</span>
            <h2 id="sheetTitle">카드 도감</h2>
          </div>
          <button class="icon-btn" id="closeSheet" title="닫기" aria-label="닫기">×</button>
        </div>
        <div class="tabs">
          <button data-sheet-tab="cards" class="active">카드</button>
          <button data-sheet-tab="inventory">장비</button>
          <button data-sheet-tab="souls">영혼</button>
          <button data-sheet-tab="account">계정</button>
        </div>
        <div id="sheetBody" class="sheet-body"></div>
      </section>

      <section class="create-modal" id="createModal" aria-modal="true" role="dialog">
        <div class="create-panel">
          <span class="eyebrow">SOL ONLINE ALPHA 0.1</span>
          <h1>소울 마스터 생성</h1>
          <label class="field">
            <span>닉네임</span>
            <input id="nameInput" maxlength="12" value="솔마스터" />
          </label>
          <div class="class-grid">
            <button data-class="warrior" class="class-card active">
              <b>전사</b>
              <span>근접, 높은 생존력</span>
            </button>
            <button data-class="taoist" class="class-card">
              <b>술사</b>
              <span>원거리, 폭발 피해</span>
            </button>
            <button data-class="cleric" class="class-card">
              <b>성직자</b>
              <span>회복, 안정 사냥</span>
            </button>
          </div>
          <button id="startGameBtn" class="start-btn">접속</button>
        </div>
      </section>

      <div class="toast" id="toast"></div>
    </div>

  </body>
</html>
