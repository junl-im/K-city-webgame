<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>K-시티 방범대</title>
  <meta name="description" content="Firebase 기반 한국형 도시 방범 웹게임">
  <link rel="preconnect" href="https://www.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://firestore.googleapis.com" crossorigin>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <section id="introScreen" class="intro-screen" aria-label="게임 인트로">
    <canvas id="introCanvas" class="intro-canvas" aria-hidden="true"></canvas>
    <div class="intro-shade"></div>
    <div class="intro-copy">
      <span class="intro-kicker">2.5D 도시 방범 RPG</span>
      <h1>K-시티 방범대</h1>
      <p>무너진 도시의 주민센터를 재건하고, 인재를 모아 밤거리의 사건을 제압하세요.</p>
      <div class="intro-actions">
        <button id="enterGameBtn" class="intro-primary" type="button">게임 시작</button>
        <button id="skipIntroBtn" class="intro-secondary" type="button">바로 입장</button>
      </div>
    </div>
    <div class="intro-status">
      <span>주민센터 비상대책반</span>
      <b>긴급 출동 대기</b>
    </div>
  </section>

  <div id="app" class="game-shell">
    <header class="topbar">
      <div class="brand">
        <span class="brand-mark">KC</span>
        <div>
          <strong>K-시티 방범대</strong>
          <small id="syncStatus">초기화 중</small>
        </div>
      </div>

      <div id="resourceBar" class="resource-bar" aria-label="보유 자원"></div>

      <div class="account-bar">
        <button id="saveBtn" class="icon-button" type="button" title="저장" aria-label="저장">
          <span>▣</span>
        </button>
        <button id="authBtn" class="primary-button" type="button">로그인</button>
      </div>
    </header>

    <div class="game-layout">
      <nav class="side-nav" aria-label="주 메뉴">
        <button class="nav-button is-active" type="button" data-view="town" title="마을">
          <span>⌂</span><b>마을</b>
        </button>
        <button class="nav-button" type="button" data-view="hunt" title="사냥터">
          <span>◇</span><b>사냥터</b>
        </button>
        <button class="nav-button" type="button" data-view="workers" title="직원">
          <span>♟</span><b>직원</b>
        </button>
        <button class="nav-button" type="button" data-view="inventory" title="인벤토리">
          <span>▤</span><b>인벤토리</b>
        </button>
        <button class="nav-button" type="button" data-view="missions" title="임무">
          <span>✓</span><b>임무</b>
        </button>
        <button class="nav-button" type="button" data-view="rank" title="랭킹">
          <span>≡</span><b>랭킹</b>
        </button>
      </nav>

      <main class="main-stage">
        <section id="townView" class="view is-active" aria-label="마을">
          <div class="town-wrap">
            <canvas id="townCanvas" class="town-canvas" aria-hidden="true"></canvas>
            <div class="district district-river"></div>
            <div class="district district-market"></div>
            <button class="building building-hall" type="button" data-building="townHall">
              <span class="building-icon">⌂</span>
              <strong>주민센터</strong>
              <small id="townHallLevel">Lv.1</small>
            </button>
            <button class="building building-police" type="button" data-building="police">
              <span class="building-icon">◆</span>
              <strong>경찰서</strong>
              <small id="policeLevel">Lv.1</small>
            </button>
            <button class="building building-power" type="button" data-building="powerPlant">
              <span class="building-icon">⚡</span>
              <strong>발전소</strong>
              <small id="powerPlantLevel">Lv.1</small>
            </button>
            <button class="building building-job" type="button" data-building="jobCenter">
              <span class="building-icon">♟</span>
              <strong>알바천국</strong>
              <small id="jobCenterLevel">Lv.1</small>
            </button>
            <button class="building building-storage" type="button" data-building="storage">
              <span class="building-icon">▤</span>
              <strong>보관함</strong>
              <small id="storageLevel">Lv.1</small>
            </button>
            <button class="building building-training" type="button" data-building="training">
              <span class="building-icon">▲</span>
              <strong>훈련소</strong>
              <small id="trainingLevel">Lv.1</small>
            </button>
            <button class="building building-lab" type="button" data-building="lab">
              <span class="building-icon">⌬</span>
              <strong>연구소</strong>
              <small id="labLevel">Lv.1</small>
            </button>
          </div>

          <aside id="buildingPanel" class="info-panel" aria-live="polite"></aside>
        </section>

        <section id="huntView" class="view" aria-label="사냥터">
          <div class="battle-zone">
            <div class="battle-header">
              <div>
                <span class="eyebrow">출동 작전</span>
                <h1 id="selectedZoneName">골목길</h1>
              </div>
              <div class="battle-stats">
                <span>팀 전투력 <b id="teamPower">0</b></span>
                <span>성공률 <b id="successRate">0%</b></span>
              </div>
            </div>
            <canvas id="battleCanvas" class="battle-canvas" aria-label="전투 연출"></canvas>
            <div class="battle-controls">
              <button id="startHuntBtn" class="primary-button big" type="button">출동</button>
              <button id="autoPickBtn" class="ghost-button" type="button">최적 편성</button>
              <div id="battleStatus" class="battle-status">대기 중</div>
            </div>
          </div>
          <aside>
            <div id="zoneList" class="zone-list"></div>
            <div id="combatLog" class="log-panel"></div>
          </aside>
        </section>

        <section id="workersView" class="view" aria-label="직원">
          <div class="section-head">
            <div>
              <span class="eyebrow">인력 현황</span>
              <h1>직원 관리</h1>
            </div>
            <button id="recruitBtn" class="primary-button" type="button">인재 모집</button>
          </div>
          <div id="partySlots" class="party-slots"></div>
          <div id="workerGrid" class="worker-grid"></div>
        </section>

        <section id="inventoryView" class="view" aria-label="인벤토리">
          <div class="section-head">
            <div>
              <span class="eyebrow">창고</span>
              <h1>보관함</h1>
            </div>
            <span id="storageUsage" class="pill">0 / 0</span>
          </div>
          <div id="inventoryGrid" class="inventory-grid"></div>
        </section>

        <section id="missionsView" class="view" aria-label="임무">
          <div class="section-head">
            <div>
              <span class="eyebrow">경찰서 상황판</span>
              <h1>임무</h1>
            </div>
          </div>
          <div id="missionList" class="mission-list"></div>
        </section>

        <section id="rankView" class="view" aria-label="랭킹">
          <div class="section-head">
            <div>
              <span class="eyebrow">시민 네트워크</span>
              <h1>랭킹</h1>
            </div>
            <button id="refreshRankBtn" class="ghost-button" type="button">새로고침</button>
          </div>
          <div id="leaderboard" class="leaderboard"></div>
        </section>
      </main>
    </div>
  </div>

  <dialog id="authDialog" class="auth-dialog">
    <form method="dialog" class="auth-card">
      <button class="close-button" value="cancel" aria-label="닫기" title="닫기">×</button>
      <span class="eyebrow">Firebase Auth</span>
      <h2>센터장 계정</h2>
      <label>
        이메일
        <input id="emailInput" type="email" autocomplete="email" placeholder="you@example.com">
      </label>
      <label>
        비밀번호
        <input id="passwordInput" type="password" autocomplete="current-password" placeholder="6자 이상">
      </label>
      <div class="auth-actions">
        <button id="emailLoginBtn" class="primary-button" type="button">이메일 로그인</button>
        <button id="emailSignupBtn" class="ghost-button" type="button">가입</button>
      </div>
      <button id="googleLoginBtn" class="google-button" type="button">Google 로그인</button>
      <p id="authMessage" class="auth-message"></p>
    </form>
  </dialog>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <script type="module" src="game.js"></script>
</body>
</html>
