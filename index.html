<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#111827" />
    <meta name="description" content="SOL Online Alpha - mobile 2.5D web MMORPG prototype" />
    <title>SOL Online Alpha</title>
  </head>
  <body>
    <div id="app">
      <div id="game-root" class="game-root"></div>

      <section class="login-screen" id="loginScreen">
        <div class="login-backdrop">
          <div class="login-art warrior-art"></div>
          <div class="login-art mage-art"></div>
        </div>

        <div class="login-panel">
          <div class="brand-block">
            <span>SOL ONLINE</span>
            <h1>소울 카드가 열린 세계</h1>
          </div>

          <div class="login-steps" aria-label="접속 단계">
            <button data-flow-step="login" class="active">로그인</button>
            <button data-flow-step="server">서버</button>
            <button data-flow-step="character">캐릭터</button>
            <button data-flow-step="world">입장</button>
          </div>

          <div class="flow-page active" data-flow-page="login">
            <div class="account-choice">
              <button id="guestLoginBtn" class="wide-action primary">게스트 접속</button>
              <button id="googleLoginBtn" class="wide-action">Google 로그인</button>
              <button id="localLoginBtn" class="wide-action subtle">로컬 저장으로 계속</button>
            </div>
            <p class="login-status" id="loginStatus">접속 방식을 선택하세요.</p>
          </div>

          <div class="flow-page" data-flow-page="server">
            <div class="server-list">
              <button data-server-id="sol-1" class="server-card active">
                <b>솔라리스 1</b>
                <span>혼잡도 원활 · 추천</span>
              </button>
              <button data-server-id="sol-2" class="server-card">
                <b>미르림 2</b>
                <span>혼잡도 보통 · 레이드 중심</span>
              </button>
            </div>
            <button id="serverNextBtn" class="wide-action primary">서버 선택</button>
          </div>

          <div class="flow-page" data-flow-page="character">
            <label class="field">
              <span>닉네임</span>
              <input id="nameInput" maxlength="12" value="솔마스터" />
            </label>
            <div class="class-grid">
              <button data-class="warrior" class="class-card active">
                <b>전사</b>
                <span>근접 · 튼튼함 · 반월참</span>
              </button>
              <button data-class="taoist" class="class-card">
                <b>술사</b>
                <span>원거리 · 폭딜 · 수정 탄환</span>
              </button>
              <button data-class="cleric" class="class-card">
                <b>성직자</b>
                <span>중거리 · 회복 · 성광</span>
              </button>
            </div>
            <div class="character-summary" id="characterSummary"></div>
            <button id="characterNextBtn" class="wide-action primary">캐릭터 준비</button>
          </div>

          <div class="flow-page" data-flow-page="world">
            <div class="world-card">
              <span id="worldServerText">솔라리스 1</span>
              <h2 id="worldCharacterText">솔마스터</h2>
              <p id="worldClassText">전사 · 근접 탱커</p>
            </div>
            <button id="enterWorldBtn" class="wide-action primary">월드 입장</button>
          </div>
        </div>
      </section>

      <header class="hud-top">
        <div class="portrait" id="classPortrait">S</div>
        <div class="hero-status">
          <div class="hud-row">
            <strong id="playerName">SOL 마스터</strong>
            <span id="levelText">Lv.1</span>
          </div>
          <div class="bar hp"><i id="hpBar"></i><em id="hpText">100/100</em></div>
          <div class="bar exp"><i id="expBar"></i><em id="expText">0%</em></div>
        </div>
        <button class="icon-btn" id="openMenu" title="메뉴" aria-label="메뉴">☰</button>
      </header>

      <aside class="resource-strip" aria-label="재화">
        <span id="goldText">0G</span>
        <span id="gemText">0소울</span>
        <span id="dpsText">전투력 0</span>
      </aside>

      <section class="target-card" id="targetCard">
        <div>
          <strong id="targetName">필드 탐색</strong>
          <span id="targetMeta">자동사냥 대기</span>
        </div>
        <div class="target-hp"><i id="targetHp"></i></div>
      </section>

      <div class="combat-log" id="combatLog"></div>

      <div class="joystick" id="joystick" aria-label="이동 조이스틱">
        <i id="joystickKnob"></i>
      </div>

      <nav class="action-dock" aria-label="전투 행동">
        <button id="autoHuntBtn" class="dock-btn"><span>⟳</span><b>자동</b></button>
        <button id="attackBtn" class="dock-btn primary"><span>⚔</span><b>공격</b></button>
        <button id="cardsBtn" class="dock-btn"><span>◆</span><b>카드</b></button>
        <button id="inventoryBtn" class="dock-btn"><span>▤</span><b>가방</b></button>
      </nav>

      <section class="sheet" id="sheet" aria-hidden="true">
        <div class="sheet-head">
          <div>
            <span id="sheetEyebrow">SOUL CODEX</span>
            <h2 id="sheetTitle">카드 도감</h2>
          </div>
          <button class="icon-btn" id="closeSheet" title="닫기" aria-label="닫기">×</button>
        </div>
        <div class="tabs">
          <button data-sheet-tab="cards" class="active">카드</button>
          <button data-sheet-tab="inventory">장비</button>
          <button data-sheet-tab="souls">영혼</button>
          <button data-sheet-tab="account">계정</button>
        </div>
        <div id="sheetBody" class="sheet-body"></div>
      </section>

      <div class="toast" id="toast"></div>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
