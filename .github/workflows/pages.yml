name: pages-manual-disabled

# Firebase Hosting을 기본 배포 대상으로 사용한다.
# GitHub Pages workflow는 자동 실행하지 않고, 필요 시 수동으로만 확인한다.
on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: soul-online-pages-manual-${{ github.ref }}
  cancel-in-progress: true

jobs:
  noop:
    runs-on: ubuntu-latest
    steps:
      - name: GitHub Pages disabled for Firebase Hosting
        run: echo "GitHub Pages auto deploy is disabled. Use Firebase Hosting dist zip or Firebase deploy workflow."
