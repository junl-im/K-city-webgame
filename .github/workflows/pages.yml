name: pages

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      NPM_CONFIG_REGISTRY: https://registry.npmjs.org/
      NPM_CONFIG_AUDIT: 'false'
      NPM_CONFIG_FUND: 'false'
      NPM_CONFIG_PROGRESS: 'false'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.16.0'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Verify lockfile registry
        run: |
          node --version
          npm --version
          npm config set registry https://registry.npmjs.org/
          if grep -R "applied-caas\|internal.api.openai.org" package-lock.json .npmrc; then
            echo "Internal registry URL detected. Regenerate package-lock.json with npm registry."
            exit 1
          fi

      - name: Install dependencies
        run: |
          npm ci --no-audit --no-fund --prefer-online || \
          (npm cache clean --force && rm -rf node_modules && npm ci --no-audit --no-fund --prefer-online --cache .npm-cache)

      - name: Build
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
